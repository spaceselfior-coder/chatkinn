<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <h2 class="logo">Instagram</h2>
            <input type="text" placeholder="Search" class="search-bar">
            <div class="nav-icons">
                <span>🏠</span>
                <span>✉️</span>
                <span>🧭</span>
                <span>❤️</span>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <section class="feed">
            <div class="post">
                <div class="post-header">
                    <img src="https://via.placeholder.com/32" alt="user">
                    <span class="username">user_name</span>
                </div>
                <img src="https://via.placeholder.com/600" class="post-img" alt="post">
                <div class="post-footer">
                    <div class="actions">
                        <span>❤️</span> <span>💬</span> <span>✈️</span>
                    </div>
                    <p class="likes"><strong>1,234 likes</strong></p>
                    <p class="caption"><strong>user_name</strong> Coding my own Instagram! #webdev</p>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="profile-summary">
                <img src="https://via.placeholder.com/50" alt="me">
                <span><strong>my_profile</strong></span>
            </div>
            <p style="color: gray;">Suggestions For You</p>
            <div class="suggestion">User_1 - Follow</div>
            <div class="suggestion">User_2 - Follow</div>
        </aside>
    </main>

</body>
</html>
